name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          VERSION="${GITHUB_REF_NAME#v}"
          go build -ldflags="-s -w -X github.com/c0tton-fluff/burp-mcp-server/cmd.version=${VERSION}" -o "burp-mcp-server-${GOOS}-${GOARCH}${ext}" .

      - name: Copy CLI artifact
        run: |
          suffix="${GOOS}-${GOARCH}"
          if [ -f "Burp-CLI/burp" ]; then
            cp Burp-CLI/burp "burp-cli-${suffix}"
          fi
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            burp-mcp-server-*
            burp-cli-*
